services:
  # ============================================
  # PostgreSQL — Single Source of Truth
  # ============================================
  postgres:
    image: postgres:15
    container_name: sms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sms
    ports:
      - "15432:5432"
    volumes:
      - sms_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis — Cache & Distributed Lock
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: sms_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # Elasticsearch — Time-Series Observation Store
  # ============================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.4
    container_name: sms_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - sms_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green|yellow'"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ============================================
  # API Backend — Core HTTP/gRPC Server (Production)
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sms_api
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "50051:50051"
    env_file:
      - .env
    environment:
      ENV: production
      DB_URL: postgresql://postgres:postgres@postgres:5432/sms?sslmode=disable
      REDIS_ADDR: redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================
  # Daily Scheduler (Production)
  # ============================================
  daily-scheduler:
    build:
      context: .
      dockerfile: cmd/daily-scheduler/Dockerfile
    container_name: sms_daily_scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENV: production
      DB_URL: postgresql://postgres:postgres@postgres:5432/sms?sslmode=disable
      REDIS_ADDR: redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================
  # Frontend Angular App + Nginx (Production)
  # ============================================
  frontend:
    build:
      context: ../sms-frontend
      dockerfile: Dockerfile
    container_name: sms_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  sms_postgres_data:
  sms_es_data:
